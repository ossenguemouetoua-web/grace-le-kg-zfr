<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programme des vacances - Focus</title>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0E1116; --paper: #EDE8DD; --paper-dim: #B9B3A4;
            --gold: #B8923F; --line: rgba(237, 232, 221, 0.07);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--ink); font-family: 'Inter', sans-serif; color: var(--paper); min-height: 100vh; }
        .wrap { max-width: 840px; margin: auto; padding: 80px 24px; }
        
        /* Styles ajoutés pour l'interaction */
        .done { text-decoration: line-through; opacity: 0.5; }
        .task-item { cursor: pointer; transition: 0.3s; }
        .task-item:hover { color: var(--gold); }
        
        #timer { font-size: 2rem; color: var(--gold); font-family: monospace; display: block; margin: 20px 0; }
        
        /* ... (garde tes styles existants de header, planning-grid, etc.) ... */
        
        /* Ajout style pour le timer actif */
        .focus-mode { border-color: var(--gold) !important; background: rgba(184, 146, 63, 0.1) !important; }
    </style>
</head>
<body>

<div class="wrap">
    <header>
        <h1>Programme des vacances</h1>
        <div class="meta-bar">
            <span class="value" id="clock">00:00:00</span>
        </div>
        <div id="timer">00:00</div>
    </header>

    <div class="planning-grid">
        <section class="card">
            <h2>Activités quotidiennes</h2>
            <ul class="agenda-list" id="task-list">
                <li class="task-item"><span>Lecture</span><span class="time">Tous les jours</span></li>
                <li class="task-item"><span>Sport</span><span class="time">45 min</span></li>
                <li class="task-item"><span>Méditation</span><span class="time">20 min</span></li>
            </ul>
        </section>
    </div>

    <div class="action">
        <button id="startBtn">Lancer Focus (25min)</button>
    </div>
</div>

<script>
    // 1. Logique de tâche cliquable
    document.querySelectorAll('.task-item').forEach(item => {
        item.addEventListener('click', () => item.classList.toggle('done'));
    });

    // 2. Logique de Timer Focus
    let timerInterval;
    document.getElementById('startBtn').addEventListener('click', function() {
        let seconds = 25 * 60;
        const display = document.getElementById('timer');
        document.querySelector('.card').classList.add('focus-mode');
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            display.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (--seconds < 0) {
                clearInterval(timerInterval);
                alert('Session terminée !');
                document.querySelector('.card').classList.remove('focus-mode');
            }
        }, 1000);
    });

    // ... (garde ton script existant pour l'horloge et les particules) ...
</script>
</body>
</html>
